<svg
  width="256"
  height="256"
  viewBox="0 0 256 256"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <!-- Brain gradient -->
    <linearGradient id="brainGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Neural circle -->
  <circle
    cx="128"
    cy="128"
    r="68"
    stroke="#1E293B"
    stroke-width="2"
    fill="none"
  />

  <!-- Brain / intelligence core -->
  <path
    d="
      M92 96
      C76 96 72 120 88 128
      C72 140 80 168 104 164
      C112 180 144 180 152 164
      C176 168 184 140 168 128
      C184 120 180 96 164 96
      C152 80 104 80 92 96
      Z"
    fill="none"
    stroke="url(#brainGradient)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#softGlow)"
  />

  <!-- Smart checkmark -->
  <path
    d="M104 132 L122 150 L156 112"
    stroke="#22C55E"
    stroke-width="8"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#softGlow)"
  />

  <!-- Neural nodes -->
  <circle cx="92" cy="128" r="3" fill="#38BDF8"/>
  <circle cx="164" cy="128" r="3" fill="#6366F1"/>
  <circle cx="128" cy="92" r="3" fill="#22C55E"/>
  <circle cx="128" cy="164" r="3" fill="#22C55E"/>
</svg>
